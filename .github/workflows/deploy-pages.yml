name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  VITE_BASE_PATH: /anbaybot/
  VITE_ANBAYBOT_SAFE_MODE: "true"
  VITE_ANBAYBOT_LIVE_TRADING_ENABLED: "false"
  VITE_APP_BASE_URL: https://cvlad97.github.io/anbaybot/
  VITE_SUPABASE_URL: https://example.supabase.co
  VITE_SUPABASE_ANON_KEY: demo-anon-key

concurrency:
  group: deploy-gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Add nojekyll
        run: touch dist/.nojekyll

      - name: Deploy dist to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
