    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  </head>
  <body>
    <script>
      (function () {
        var l = window.location;
        var basePath = '/anbaybot/';
        var hasHash = !!l.hash;

        if (l.search && l.search.startsWith('?/')) {
          var routeFromQuery = l.search.slice(2);
          var queryRoute = routeFromQuery.startsWith('/') ? routeFromQuery : '/' + routeFromQuery;
          var targetFromQuery = basePath + '#' + queryRoute + l.hash;
          window.location.replace(targetFromQuery);
          return;
        }

        if (!hasHash && l.pathname.startsWith(basePath) && l.pathname !== basePath) {
          var routeFromPath = l.pathname.slice(basePath.length - 1);
          var normalizedRoute = routeFromPath.startsWith('/') ? routeFromPath : '/' + routeFromPath;
          var targetFromPath = basePath + '#' + normalizedRoute + l.search;
          window.location.replace(targetFromPath);
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
